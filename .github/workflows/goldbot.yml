name: Gold Price Bot

on:
  schedule:
    - cron: "0 1 * * *"
    - cron: "0 6 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: python line_test.py
