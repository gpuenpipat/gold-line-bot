name: Gold Price Bot

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 6 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install packages
      run: |
        pip install requests
        pip install beautifulsoup4

    - name: Run bot
      env:
        LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        LINE_USER: ${{ secrets.LINE_USER }}
      run: python line_test.py
