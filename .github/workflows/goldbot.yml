name: Gold Bot

on:
  schedule:
    - cron: '0 1,6,11 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run bot
        run: python line_test.py

      - name: Commit updated price
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add last_price.txt
          git commit -m "Update gold price" || echo "No changes"
          git push
